name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Run tests
      env:
        NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      run: pytest -m "not live_network"
